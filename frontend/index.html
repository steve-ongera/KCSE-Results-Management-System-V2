<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>KCSE Results Portal — Kenya National Examinations Council</title>
    <meta name="description"
      content="Check your KCSE examination results instantly using your index number. Official Kenya National Examinations Council results portal." />
    <meta name="keywords"
      content="KCSE results, KNEC, Kenya examinations, secondary school results, index number" />
    <meta name="author" content="Kenya National Examinations Council" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="KCSE Results Portal" />
    <meta property="og:description" content="Check your KCSE results instantly — no login required." />
    <meta property="og:url"         content="https://results.knec.ac.ke" />
    <meta property="og:locale"      content="en_KE" />

    <!-- Theme colour (Kenya green) -->
    <meta name="theme-color" content="#166534" />

    <!-- Google Fonts — preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Security headers via meta (supplement server headers) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options"        content="DENY" />

    <!-- Inline critical CSS — prevents flash of unstyled content -->
    <style>
      /* Prevent layout shift before Tailwind/fonts load */
      *, *::before, *::after { box-sizing: border-box; }
      html { font-family: 'DM Sans', system-ui, sans-serif; }
      body { margin: 0; background: #f9fafb; color: #111827; }
      #root { min-height: 100vh; }

      /* Initial page loader (before React mounts) */
      #initial-loader {
        position: fixed; inset: 0; background: #f9fafb;
        display: flex; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.3s ease;
      }
      #initial-loader.hidden { opacity: 0; pointer-events: none; }
      .init-spinner {
        width: 48px; height: 48px;
        border: 4px solid #dcfce7;
        border-top-color: #166534;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <!-- Pre-React loader — hidden once React hydrates -->
    <div id="initial-loader" aria-label="Loading…" aria-live="polite">
      <div class="init-spinner"></div>
    </div>

    <!-- React mounts here -->
    <div id="root"></div>

    <!-- Hide the pre-React loader once JS runs -->
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        // Give React ~100ms to mount, then fade out the loader
        setTimeout(function () {
          var loader = document.getElementById('initial-loader')
          if (loader) {
            loader.classList.add('hidden')
            setTimeout(function () { loader.remove() }, 350)
          }
        }, 100)
      })
    </script>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
